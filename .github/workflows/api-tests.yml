name: API Tests (Newman)

on:
  push:
    paths:
      - 'api-testing-project/**'
      - '.github/workflows/api-tests.yml'
  pull_request:
    paths:
      - 'api-testing-project/**'
      - '.github/workflows/api-tests.yml'
  workflow_dispatch:

jobs:
  newman:
    name: Run Postman collection
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api-testing-project

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman
        run: npm install --global newman

      - name: Run API tests and export JUnit report
        env:
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
        run: |
          mkdir -p test-results
          newman run collection.json \
            -e environment.json \
            --env-var "api_key=$REQRES_API_KEY" \
            --reporters cli,junit \
            --reporter-junit-export test-results/newman-results.xml

      - name: Upload test report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-junit-report
          path: api-testing-project/test-results/newman-results.xml
          if-no-files-found: warn
