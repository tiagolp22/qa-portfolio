name: API Tests (Newman)

on:
  push:
    paths:
      - 'api-testing-project/**'
      - '.github/workflows/api-tests.yml'
  pull_request:
    paths:
      - 'api-testing-project/**'
      - '.github/workflows/api-tests.yml'
  workflow_dispatch:

jobs:
  newman:
    name: Run Postman collection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run API tests and export JUnit report (Docker)
        run: |
          mkdir -p api-testing-project/test-results
          docker run --rm \
            -v "$GITHUB_WORKSPACE/api-testing-project:/etc/newman" \
            postman/newman:alpine \
            run collection.json \
            -e environment.json \
            --env-var apiKey=reqres-free-v1 \
            --env-var baseUrl=https://reqres.in/api \
            --reporters cli,junit \
            --reporter-junit-export test-results/newman-results.xml

      - name: Upload test report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-junit-report
          path: api-testing-project/test-results/newman-results.xml
          if-no-files-found: warn
