name: API Tests (Newman)

on:
  push:
    paths:
      - 'api-testing-project/**'
      - '.github/workflows/api-tests.yml'
  pull_request:
    paths:
      - 'api-testing-project/**'
      - '.github/workflows/api-tests.yml'
  workflow_dispatch:

jobs:
  newman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Postman collection (Newman action)
        uses: matt-ball/newman-action@v2
        with:
          collection: api-testing-project/collection.json
          environment: api-testing-project/environment.json
          reporters: cli,junit
          reporter-junit-export: newman/newman-results.xml

      - name: Upload Newman report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: newman/newman-results.xml
          if-no-files-found: warn
