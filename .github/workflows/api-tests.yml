name: API Tests (Newman)

on:
  push:
    paths:
      - 'api-testing-project/**'
      - '.github/workflows/api-tests.yml'
  pull_request:
    paths:
      - 'api-testing-project/**'
      - '.github/workflows/api-tests.yml'
  workflow_dispatch:

jobs:
  newman:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api-testing-project

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman
        run: npm install --global newman

      - name: Run Postman collection
        run: newman run collection.json -e environment.json --reporters cli
